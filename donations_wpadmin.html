<!-- Preconnect to critical origins only (max 4 — Lighthouse warns above 4).
     DO NOT add more preconnects; use dns-prefetch for non-critical origins.
     CAN improve: if image CDN changes, update the preconnect href. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://secure.kbmandir.org" crossorigin>
<link rel="preconnect" href="https://madhupurinivaasadasa.github.io" crossorigin>
<link rel="dns-prefetch" href="https://www.kbmandir.org">
<link rel="dns-prefetch" href="https://www.kbgoshala.org">

<!-- Non-blocking font load: media="print" defers download, onload swaps to "all".
     Already has display=swap in the Google Fonts URL. DO NOT change to blocking <link>. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" media="print" onload="this.media='all'">
<!-- For local testing, uncomment the line below and comment out the CDN line -->

<link rel="stylesheet" href="https://madhupurinivaasadasa.github.io/ihf-scripts/donations_wpadmin.min.css"/>

<!-- DO NOT remove opacity:0 — prevents flash of unstyled content (FOUC) in WordPress.
     Lighthouse flags CLS but removing it causes visible layout thrashing as WP theme loads.
     The 1500ms fallback ensures content shows even if JS fails. -->
<div id="donationPageWrap" style="opacity:0">
<script>setTimeout(function(){document.getElementById("donationPageWrap").style.opacity="1";},1500);</script>

<h1>Donation Opportunities</h1>

</div>
