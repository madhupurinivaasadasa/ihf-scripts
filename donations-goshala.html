<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Goshala - Donation Opportunities</title>

    <!-- Preconnect to critical origins only (max 4 — Lighthouse warns above 4).
         3 here (no CDN needed for local file serving). CAN add a 4th if image CDN changes. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://secure.kbmandir.org" crossorigin>
    <link rel="dns-prefetch" href="https://www.kbgoshala.org">
    <link rel="dns-prefetch" href="https://secure.kbmandir.org">
    <link rel="dns-prefetch" href="https://ihf.app.neoncrm.com">

    <!-- Non-blocking font load. DO NOT change to blocking <link>. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="donations_wpadmin.css"/>
</head>
<body>

<!-- OAuth donor login bar. Styles in donations_wpadmin.css, behavior in
     donor-login-bar.js. Redirect/logout target point to kbgoshala.org for
     parity with the production donations_wpadmin-goshala.html. -->
<div id="kbmLoginBar"
     data-redirect="https://www.kbgoshala.org/donate"
     data-logout-target="https://www.kbgoshala.org/donate">
  <div class="kbm-left">
    <a id="kbmPortalBtn" class="kbm-signed-in" href="https://secure.kbmandir.org/" target="_blank" rel="noopener">View Donor Portal ↗</a>
  </div>
  <div class="kbm-right">
    <span id="kbmLoginHint" class="kbm-signed-out">Returning donor? Sign in to autofill your details</span>
    <a id="kbmLoginBtn" class="kbm-signed-out" href="#">Donor Login →</a>
    <span id="kbmLoggedIn" class="kbm-signed-in">
      <span class="kbm-check" aria-hidden="true">✓</span>Signed in<span class="kbm-sep" aria-hidden="true">·</span><a id="kbmLogoutBtn" href="#">Sign out</a>
    </span>
  </div>
</div>

<h1>Donation Opportunities</h1>


<div class="employer-banner" id="employerBanner">
    Your Employer: <strong id="bannerEmployerName"></strong>
    <span id="matchingBadge" class="matching-badge"></span>
    <span class="edit-link" onclick="showEmployerModal()">Edit</span>
</div>

<div class="section-header">
    <h2>Choose Your Seva</h2>
    <p>Every offering is an act of devotion. Select a seva to view details and donate.</p>
</div>

<div id="heroTile"></div>
<div class="container" id="donationTiles"></div>

<script src="donation-tiles-goshala.js"></script>
<script src="donation-matcher.js"></script>
<script src="donor-login-bar.js"></script>

</body>
</html>
